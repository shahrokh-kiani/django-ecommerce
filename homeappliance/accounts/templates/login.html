{% extends 'base.html' %}
{% load static %}

{% block title %}ورود — فروشگاه لوازم خانگی{% endblock %}

{% block content %}

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <h1 class="auth-title">ورود به حساب</h1>
      <p class="auth-subtitle">خوش برگشتی! اطلاعات حسابت رو وارد کن</p>
    </div>

    {% if error %}
      <div class="auth-error">
        <i class="ti ti-alert-circle"></i> {{ error }}
      </div>
    {% endif %}

    <form method="POST" class="auth-form">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">نام کاربری</label>
        <div class="input-wrapper">
          <i class="ti ti-user"></i>
          <input type="text" id="username" name="username" placeholder="نام کاربری خود را وارد کنید" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">رمز عبور</label>
        <div class="input-wrapper">
          <i class="ti ti-lock"></i>
          <input type="password" id="password" name="password" placeholder="رمز عبور خود را وارد کنید" required>
        </div>
      </div>

      <button type="submit" class="auth-btn">ورود</button>

    </form>

    <div class="auth-footer">
      حساب نداری؟ <a href="{% url 'register' %}">ثبت‌نام کن</a>
    </div>

  </div>
</div>

{% endblock %}
