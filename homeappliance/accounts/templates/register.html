{% extends 'base.html' %}
{% load static %}

{% block title %}ثبت‌نام — فروشگاه لوازم خانگی{% endblock %}

{% block content %}

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <h1 class="auth-title">ساخت حساب کاربری</h1>
      <p class="auth-subtitle">سریع ثبت‌نام کن و خریدت رو شروع کن</p>
    </div>

    {% if error %}
      <div class="auth-error">
        <i class="ti ti-alert-circle"></i> {{ error }}
      </div>
    {% endif %}

    <form method="POST" class="auth-form">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">نام کاربری</label>
        <div class="input-wrapper">
          <i class="ti ti-at"></i>
          <input type="text" id="username" name="username" placeholder="نام کاربری را انتخاب کنید" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">ایمیل</label>
        <div class="input-wrapper">
          <i class="ti ti-mail"></i>
          <input type="email" id="email" name="email" placeholder="ایمیل خود را وارد کنید" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">رمز عبور</label>
        <div class="input-wrapper">
          <i class="ti ti-lock"></i>
          <input type="password" id="password" name="password" placeholder="حداقل ۶ کاراکتر" required>
        </div>
      </div>

      <button type="submit" class="auth-btn">ثبت‌نام</button>

    </form>

    <div class="auth-footer">
      قبلاً ثبت‌نام کردی؟ <a href="{% url 'login' %}">وارد شو</a>
    </div>

  </div>
</div>

{% endblock %}
